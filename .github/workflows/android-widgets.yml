name: Build Android Widgets APK

on:
  push:
    branches: [main]
    paths: ['android-widgets/**', '.github/workflows/android-widgets.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        working-directory: android-widgets
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gradle wrapper
        working-directory: android-widgets
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android-widgets
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FichaEclipseWidgets-debug
          path: android-widgets/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-widgets/app/build/outputs/apk/debug/*.apk
