name: Build Eclipse APK

on:
  push:
    branches: [main]
    paths: ['Android/**', '.github/workflows/android.yml', 'index.html', 'biblioteca.html', 'manifest.webmanifest', 'sw.js', 'icons/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets → APK bundle
        run: bash Android/sync-assets.sh

      - name: Generate debug keystore
        working-directory: Android
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gradle wrapper
        working-directory: Android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build debug APK
        working-directory: Android
        run: ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp Android/app/build/outputs/apk/debug/*.apk dist/Eclipse.apk

      - name: Extract versionName
        id: ver
        run: |
          VER=$(grep -oP 'versionName\s*"\K[^"]+' Android/app/build.gradle)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VER"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eclipse-debug
          path: dist/Eclipse.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish versioned release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Eclipse v${{ steps.ver.outputs.version }}
          body: |
            APK v${{ steps.ver.outputs.version }} buildado a partir de `main`.

            **Download:** `Eclipse.apk` abaixo.

            Commit: `${{ github.sha }}`
          files: dist/Eclipse.apk
          prerelease: false
          make_latest: true

      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Eclipse.apk
