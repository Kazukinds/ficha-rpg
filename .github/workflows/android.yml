name: Build Eclipse APK

on:
  push:
    branches: [main]
    paths: ['Android/**', '.github/workflows/android.yml', 'index.html', 'biblioteca.html', 'manifest.webmanifest', 'sw.js', 'icons/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets → APK bundle
        run: bash Android/sync-assets.sh

      - name: Ensure stable keystores (debug + release)
        id: keystore
        working-directory: Android
        run: |
          seeded=0
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            seeded=1
          fi
          if [ ! -f release.keystore ]; then
            keytool -genkey -v \
              -keystore release.keystore \
              -storepass eclipse-release \
              -alias eclipse-release \
              -keypass eclipse-release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Eclipse RPG,O=Kazuki Eclipse,L=Brasil,C=BR"
            seeded=1
          fi
          echo "seeded=$seeded" >> "$GITHUB_OUTPUT"

      - name: Commit seeded keystores
        if: steps.keystore.outputs.seeded == '1' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Android/debug.keystore Android/release.keystore
          git commit -m "ci: seed stable keystores [skip ci]"
          git push

      - name: Gradle wrapper
        working-directory: Android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build release APK
        working-directory: Android
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp Android/app/build/outputs/apk/release/*.apk dist/Eclipse.apk

      - name: Extract versionName
        id: ver
        run: |
          VER=$(grep -oP 'versionName\s*"\K[^"]+' Android/app/build.gradle)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VER"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eclipse-debug
          path: dist/Eclipse.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish versioned release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Eclipse v${{ steps.ver.outputs.version }}
          body: |
            APK v${{ steps.ver.outputs.version }} buildado a partir de `main`.

            **Download:** `Eclipse.apk` abaixo.

            Commit: `${{ github.sha }}`
          files: dist/Eclipse.apk
          prerelease: false
          make_latest: true

      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Eclipse.apk
