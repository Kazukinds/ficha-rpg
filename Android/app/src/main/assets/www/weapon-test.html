<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Weapon Render Test</title>
<style>
  :root{--cell:60px;--bg:#0c0c0e;--cell-bg:#1a1a1f;--border:#2a2a32;--lime:#c8f542;--text:#d4d4d8;--dim:#71717a}
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);font:14px/1.4 system-ui,sans-serif}
  h1{margin:0 0 16px;font-size:20px}
  h2{margin:24px 0 8px;font-size:14px;color:var(--dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .scenarios{display:grid;grid-template-columns:1fr;gap:48px}
  .scenario{background:#13131a;border:1px solid var(--border);border-radius:8px;padding:24px}
  .label{font-size:12px;color:var(--lime);font-family:monospace;margin-bottom:10px}
  .grid{display:grid;gap:1px;background:var(--border);padding:1px;width:max-content;margin:0 auto;position:relative}
  .cell{width:var(--cell);height:var(--cell);background:var(--cell-bg);position:relative;overflow:hidden}
  .overlay{position:absolute;top:1px;left:1px;background:rgba(0,0,0,.42);overflow:hidden}
  .overlay img{transform-origin:center;display:block}
  .meta{font-size:10px;color:var(--dim);font-family:monospace;margin-top:8px;text-align:center}
  button{background:transparent;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin:2px}
  button:hover{border-color:var(--lime);color:var(--lime)}
  button.active{background:var(--lime);color:#000;border-color:var(--lime)}
  .controls{margin:8px 0;text-align:center}
  .url-input{width:100%;padding:6px;background:#0a0a0e;border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:monospace;font-size:11px;margin-bottom:12px}
</style>
</head>
<body>
<h1>Weapon SVG Render Test</h1>

<div style="background:#13131a;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:24px">
  <div class="controls">
    <button onclick="setScale(0.6)">cell 36px</button>
    <button onclick="setScale(1)" class="active" id="b1">cell 60px</button>
    <button onclick="setScale(1.5)">cell 90px</button>
    <button onclick="render()">Re-render</button>
  </div>
  <div class="controls" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <span style="font-size:11px;color:var(--dim);margin-right:8px">Filter ratio:</span>
    <button data-filter="all" class="active" onclick="setFilter('all',event)">Todos</button>
    <button data-filter="landscape" onclick="setFilter('landscape',event)">Landscape (0° / 180°)</button>
    <button data-filter="portrait" onclick="setFilter('portrait',event)">Portrait (90° / -90°)</button>
  </div>
  <div class="controls" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <span style="font-size:11px;color:var(--dim);margin-right:8px">Weapon:</span>
    <span id="weapon-buttons"></span>
  </div>
</div>

<div class="scenarios" id="scenarios"></div>

<script>
const _wpnTrimCache=new Map();
async function _wpnTrimSrc(src){
  if(_wpnTrimCache.has(src))return _wpnTrimCache.get(src);
  try{
    const r=await fetch(src);const text=await r.text();
    const doc=new DOMParser().parseFromString(text,'image/svg+xml');
    const svg=doc.documentElement;
    const wrap=document.createElement('div');
    wrap.style.cssText='position:absolute;visibility:hidden;left:-99999px;top:0';
    wrap.appendChild(svg);document.body.appendChild(wrap);
    let bb;try{bb=svg.getBBox()}catch(_){bb=null}
    document.body.removeChild(wrap);
    if(!bb||!bb.width||!bb.height){_wpnTrimCache.set(src,null);return null}
    const pad=Math.max(bb.width,bb.height)*0.04;
    const vbX=bb.x-pad,vbY=bb.y-pad,vbW=bb.width+pad*2,vbH=bb.height+pad*2;
    svg.setAttribute('viewBox',`${vbX} ${vbY} ${vbW} ${vbH}`);
    svg.removeAttribute('width');svg.removeAttribute('height');
    svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    const xml=new XMLSerializer().serializeToString(svg);
    const url='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));
    const out={url,ratio:vbW/vbH,vbW,vbH};
    _wpnTrimCache.set(src,out);return out;
  }catch(e){console.error(e);_wpnTrimCache.set(src,null);return null}
}

const _wpnCats=[
  {cat:'Assault',weapons:[
    {key:'rifle',label:'Assault Rifle',base:'icons/weapons/firearms/assault-rifle-04'},
  ]},
  {cat:'Pistol',weapons:[
    {key:'pistol01',label:'Beretta 92',base:'icons/weapons/firearms/pistol-01'},
    {key:'pistol02',label:'Glock 17',base:'icons/weapons/firearms/pistol-02'},
    {key:'pistol03',label:'Sig Sauer P226',base:'icons/weapons/firearms/pistol-03'},
    {key:'pistol04',label:'Colt 1911',base:'icons/weapons/firearms/pistol-04'},
    {key:'pistol05',label:'HK USP',base:'icons/weapons/firearms/pistol-05'},
    {key:'pistol06',label:'Walther PPK',base:'icons/weapons/firearms/pistol-06'},
    {key:'pistol07',label:'CZ 75',base:'icons/weapons/firearms/pistol-07'},
    {key:'pistol08',label:'Desert Eagle',base:'icons/weapons/firearms/pistol-08'},
    {key:'m422',label:'M4-22 Pistol',base:'icons/weapons/firearms/m4-22-pistol'},
  ]},
  {cat:'Revolver',weapons:[
    {key:'colt',label:'Colt Revolver',base:'icons/weapons/firearms/colt-revolver'},
    {key:'revolver',label:'Revolver',base:'icons/weapons/firearms/revolver'},
  ]},
  {cat:'Heavy',weapons:[
    {key:'benalli',label:'Benalli M4',base:'icons/weapons/firearms/benalli-m4'},
    {key:'m240',label:'M240',base:'icons/weapons/firearms/m240'},
    {key:'machinegun',label:'Machine Gun',base:'icons/weapons/firearms/machine-gun'},
    {key:'rpg',label:'RPG',base:'icons/weapons/firearms/rpg'},
    {key:'shotgun01',label:'Shotgun 01',base:'icons/weapons/firearms/shotgun-01'},
    {key:'shotgun02',label:'Shotgun 02',base:'icons/weapons/firearms/shotgun-02'},
    {key:'shotgun03',label:'Shotgun 03',base:'icons/weapons/firearms/shotgun-03'},
  ]},
  {cat:'Melee',weapons:[
    {key:'knife',label:'Knife',base:'icons/weapons/melee/knife'},
  ]},
  {cat:'Ammo',weapons:[
    {key:'a-308',label:'308 Caliber',base:'icons/weapons/firearms/ammo/308-caliber',square:true},
    {key:'a-32',label:'32 Auto',base:'icons/weapons/firearms/ammo/32-auto',square:true},
    {key:'a-376',label:'376 Caliber',base:'icons/weapons/firearms/ammo/376-caliber',square:true},
    {key:'a-38x55',label:'38x55',base:'icons/weapons/firearms/ammo/38x55',square:true},
    {key:'a-404',label:'404 Jeffery',base:'icons/weapons/firearms/ammo/404-jeffery',square:true},
    {key:'a-44',label:'44 Rem Mag',base:'icons/weapons/firearms/ammo/44-rem-mag',square:true},
    {key:'a-450',label:'450 Bushmaster',base:'icons/weapons/firearms/ammo/450-bushmaster',square:true},
    {key:'a-45gap',label:'45 GAP',base:'icons/weapons/firearms/ammo/45gap',square:true},
    {key:'a-4buck',label:'4 Buck',base:'icons/weapons/firearms/ammo/4buck',square:true},
    {key:'a-50bmg',label:'50 BMG',base:'icons/weapons/firearms/ammo/50bmg',square:true},
    {key:'a-762x32',label:'7.62x32',base:'icons/weapons/firearms/ammo/762x32',square:true},
    {key:'a-762x54r',label:'7.62x54R',base:'icons/weapons/firearms/ammo/762x54r',square:true},
    {key:'a-8mm',label:'8mm Kurt',base:'icons/weapons/firearms/ammo/8mm-kurt',square:true},
    {key:'a-bb',label:'BB Shot',base:'icons/weapons/firearms/ammo/bb-shot',square:true},
    {key:'a-bird',label:'Bird Shot',base:'icons/weapons/firearms/ammo/bird-shot',square:true},
    {key:'a-m962',label:'M962',base:'icons/weapons/firearms/ammo/m962',square:true},
    {key:'a-rpg-rocket',label:'RPG Rocket',base:'icons/weapons/firearms/ammo/rpg-rocket',square:true},
    {key:'a-slug',label:'Slug',base:'icons/weapons/firearms/ammo/slug',square:true},
  ]},
];
const _wpnDefs=_wpnCats.flatMap(c=>c.weapons);
const WEAPONS=Object.fromEntries(_wpnDefs.map(d=>{
  if(d.square){return[d.key,[{label:'0°',file:`${d.base}.svg`}]]}
  return[d.key,[
    {label:'0°',file:`${d.base}.svg`},
    {label:'90°',file:`${d.base}-r90.svg`},
    {label:'180°',file:`${d.base}-r180.svg`},
    {label:'-90°',file:`${d.base}-rm90.svg`},
  ]];
}));
let _curWeapon='rifle';
let ROT_FILES=WEAPONS[_curWeapon];
const SCENARIOS=[
  {gw:3,gh:1,label:'3×1 landscape'},
  {gw:1,gh:3,label:'1×3 portrait'},
  {gw:3,gh:2,label:'3×2 landscape'},
  {gw:2,gh:3,label:'2×3 portrait'},
  {gw:5,gh:2,label:'5×2 wide'},
  {gw:2,gh:5,label:'2×5 tall'},
  {gw:1,gh:1,label:'1×1 single'},
  {gw:2,gh:2,label:'2×2 square'},
];

let _filter='all';
function setScale(s){
  document.documentElement.style.setProperty('--cell',(60*s)+'px');
  document.querySelectorAll('.controls button').forEach(b=>{if(b.textContent.includes('cell'))b.classList.remove('active')});
  event.target.classList.add('active');
  render();
}
function setFilter(f,ev){
  _filter=f;
  document.querySelectorAll('button[data-filter]').forEach(b=>b.classList.remove('active'));
  ev.target.classList.add('active');
  render();
}
function setWeapon(w,ev){
  _curWeapon=w;
  ROT_FILES=WEAPONS[w];
  document.querySelectorAll('button[data-weapon]').forEach(b=>b.classList.remove('active'));
  ev.target.classList.add('active');
  render();
}

async function render(){
  _wpnTrimCache.clear();
  const cont=document.getElementById('scenarios');
  cont.innerHTML='';
  // Pre-trim all 4 rotation files.
  const trims=await Promise.all(ROT_FILES.map(r=>_wpnTrimSrc(r.file)));
  if(trims.some(t=>!t)){cont.innerHTML='<div style="color:#ff5c5c">Failed to load/trim one or more SVGs</div>';return}
  for(const s of SCENARIOS){
    const sc=document.createElement('div');
    sc.className='scenario';
    sc.style.gridColumn='1 / -1';
    sc.innerHTML=`<div class="label">gw=${s.gw} gh=${s.gh} — ${s.label}</div>`;
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:36px;flex-wrap:wrap;justify-content:center;margin-top:14px';
    ROT_FILES.forEach((rf,idx)=>{
      const t=trims[idx];
      if(_filter==='landscape'&&t.ratio<1)return;
      if(_filter==='portrait'&&t.ratio>=1)return;
      const wrap=document.createElement('div');
      wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px;border:1px dashed #2a2a32;border-radius:6px';
      const tag=document.createElement('div');
      tag.style.cssText='font-size:13px;color:var(--lime);font-family:monospace;font-weight:700';
      tag.textContent=`SVG ${rf.label}`;
      const sub=document.createElement('div');
      sub.style.cssText='font-size:11px;color:#71717a;font-family:monospace';
      sub.textContent=`ratio ${t.ratio.toFixed(3)} · viewBox ${t.vbW.toFixed(0)}×${t.vbH.toFixed(0)}`;
      wrap.appendChild(tag);
      wrap.appendChild(sub);
      const grid=document.createElement('div');
      grid.className='grid';
      grid.style.gridTemplateColumns=`repeat(${Math.max(s.gw,3)},var(--cell))`;
      grid.style.gridTemplateRows=`repeat(${Math.max(s.gh,3)},var(--cell))`;
      const totalCells=Math.max(s.gw,3)*Math.max(s.gh,3);
      for(let i=0;i<totalCells;i++){
        const c=document.createElement('div');c.className='cell';grid.appendChild(c)
      }
      const overlay=document.createElement('div');
      overlay.className='overlay';
      overlay.style.width=`calc(${s.gw}*var(--cell) + ${s.gw-1}px)`;
      overlay.style.height=`calc(${s.gh}*var(--cell) + ${s.gh-1}px)`;
      const img=document.createElement('img');
      img.src=t.url;
      img.alt='weapon';
      overlay.appendChild(img);
      grid.appendChild(overlay);
      applyFit(img,s.gw,s.gh,t);
      wrap.appendChild(grid);
      row.appendChild(wrap);
    });
    sc.appendChild(row);
    cont.appendChild(sc);
  }
}

function applyFit(img,iw,ih,t){
  const _scl=0.96;
  const _overlayLandscape=iw>=ih;
  const contentLandscape=t.ratio>=1;
  const _cellSquare=iw===ih;
  // Auto-rotate only when cell is non-square AND content orientation mismatches.
  const totalRot=(!_cellSquare&&contentLandscape!==_overlayLandscape)?90:0;
  const _isPerp=totalRot===90;
  const _contentLong=Math.max(t.ratio,1/t.ratio);
  const _maxCells=Math.max(iw,ih);
  let _ew_cells,_eh_cells;
  if(totalRot===0){
    _ew_cells=iw;_eh_cells=ih;
  }else{
    if(contentLandscape){
      _ew_cells=Math.min(ih,iw*_contentLong);
      _eh_cells=_ew_cells/_contentLong;
    }else{
      _eh_cells=Math.min(iw,ih*_contentLong);
      _ew_cells=_eh_cells/_contentLong;
    }
  }
  const _ew_pct=(100*_ew_cells/iw);
  const _eh_pct=(100*_eh_cells/ih);
  Object.assign(img.style,{
    position:'absolute',left:'50%',top:'50%',
    width:_ew_pct+'%',height:_eh_pct+'%',
    objectFit:'contain',
    transform:`translate(-50%,-50%) scale(${_scl}) rotate(${totalRot}deg)`,
    transformOrigin:'center center'
  });
}

const _wbWrap=document.getElementById('weapon-buttons');
_wpnCats.forEach(c=>{
  const catWrap=document.createElement('div');
  catWrap.style.cssText='display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:6px;border-left:2px solid var(--lime);padding-left:8px';
  const catLbl=document.createElement('span');
  catLbl.style.cssText='font-size:10px;color:var(--lime);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-right:4px;min-width:70px';
  catLbl.textContent=c.cat;
  catWrap.appendChild(catLbl);
  c.weapons.forEach(d=>{
    const b=document.createElement('button');
    b.dataset.weapon=d.key;
    if(d.key===_curWeapon)b.classList.add('active');
    b.textContent=d.label;
    b.onclick=ev=>setWeapon(d.key,ev);
    catWrap.appendChild(b);
  });
  _wbWrap.appendChild(catWrap);
});

render();
</script>
</body>
</html>
