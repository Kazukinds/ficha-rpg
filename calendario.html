<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap">
<title>Calendário — ECLIPSE</title>
<style>
:root{
  --bg:#09090b;--card:#131316;--card-hover:#18181c;--input:#1c1c21;
  --border:#232329;--border-hover:#2a2a32;
  --text:#f0f0f5;--dim:#5a5a6e;--label:#a0a0b0;
  --accent:#c8f542;--accent-2:#9aa0b3;
  --red:#f87171;--blue:#60a5fa;--purple:#c084fc;--rose:#f472b6;--orange:#fb923c;--cyan:#22d3ee;--gold:#fbbf24;
  --r:14px;
  --moon:#e8e9ee;--star:#c8f542;
  --shadow:0 8px 28px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);min-height:100vh;color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:36px 28px 90px;max-width:1280px;margin:0 auto}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* HEADER */
.cal-head{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.cal-title{display:flex;align-items:center;gap:14px}
.cal-logo{width:46px;height:46px;border-radius:14px;background:radial-gradient(circle at 35% 30%,#1c1c25,#0c0c12);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);position:relative;overflow:hidden}
.cal-logo::before{content:"";position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--moon) 0% 60%,transparent 65%);box-shadow:inset -8px 4px 0 rgba(0,0,0,.55)}
.cal-logo::after{content:"";position:absolute;width:14px;height:14px;background:var(--star);clip-path:polygon(50% 0%,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0% 50%,42% 42%);right:6px;bottom:8px;filter:drop-shadow(0 0 6px rgba(200,245,66,.65))}
.cal-title h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;letter-spacing:-.4px;line-height:1}
.cal-title small{display:block;color:var(--dim);font-size:12px;letter-spacing:2.5px;text-transform:uppercase;margin-top:6px}
.cal-actions{display:flex;flex-wrap:wrap;gap:8px}
.btn{padding:9px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;letter-spacing:1.4px;text-transform:uppercase;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:border-color .15s,background .15s,color .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0a0a0b;border-color:var(--accent)}
.btn.primary:hover{background:#d6ff58;color:#0a0a0b}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red);border-color:rgba(248,113,113,.35)}
.btn.danger:hover{background:rgba(248,113,113,.08);border-color:var(--red)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn-back{position:fixed;top:18px;left:18px;z-index:50;padding:8px 14px;border-radius:22px}

/* CONTROL BAR */
.bar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:22px}
.bar-left,.bar-right{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.month-nav{display:flex;align-items:center;gap:6px}
.nav-btn{width:34px;height:34px;border-radius:10px;background:var(--input);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.month-label{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;min-width:200px;text-align:center;letter-spacing:.4px;text-transform:capitalize}
select,input[type=text],input[type=number]{background:var(--input);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--accent)}

.view-tabs{display:flex;gap:0;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:3px}
.view-tab{padding:6px 12px;border-radius:6px;background:transparent;border:none;color:var(--dim);font-family:inherit;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;transition:all .15s}
.view-tab.active{background:var(--card);color:var(--accent);box-shadow:inset 0 0 0 1px rgba(200,245,66,.2)}

/* GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:28px}
.cal-dow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;text-align:center;padding:8px 4px}
.cal-day{
  position:relative;aspect-ratio:1/1;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:8px;display:flex;flex-direction:column;cursor:pointer;
  transition:transform .18s,border-color .18s,background .18s;
  min-height:64px;
}
.cal-day:hover{border-color:var(--border-hover);background:var(--card-hover);transform:translateY(-1px)}
.cal-day.muted{opacity:.35}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 14px rgba(200,245,66,.18)}
.cal-day.has-event::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-day-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);align-self:flex-start}
.cal-day.today .cal-day-num{color:var(--accent)}
.cal-day-mini{display:flex;flex-direction:column;gap:2px;margin-top:4px;overflow:hidden;flex:1}
.cal-day-pill{font-size:9px;line-height:1.2;padding:2px 5px;border-radius:4px;background:rgba(200,245,66,.1);color:var(--accent);border-left:2px solid var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-day-pill.t-sessao{background:rgba(96,165,250,.12);color:var(--blue);border-left-color:var(--blue)}
.cal-day-pill.t-combate{background:rgba(248,113,113,.12);color:var(--red);border-left-color:var(--red)}
.cal-day-pill.t-festa{background:rgba(251,191,36,.12);color:var(--gold);border-left-color:var(--gold)}
.cal-day-pill.t-mistica{background:rgba(192,132,252,.14);color:var(--purple);border-left-color:var(--purple)}
.cal-day-pill.t-luna{background:rgba(154,160,179,.12);color:var(--accent-2);border-left-color:var(--accent-2)}
.cal-day-pill.t-marco{background:rgba(244,114,182,.12);color:var(--rose);border-left-color:var(--rose)}
.cal-day-more{font-size:9px;color:var(--dim);text-align:right;font-family:'JetBrains Mono',monospace}

/* AGENDA VIEW */
.agenda{display:none;flex-direction:column;gap:10px}
.agenda.active{display:flex}
.cal-grid.hidden{display:none}
.agenda-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;border-left:3px solid var(--accent);transition:border-color .15s,background .15s}
.agenda-item:hover{background:var(--card-hover);border-color:var(--accent)}
.agenda-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);min-width:96px;letter-spacing:1px;text-transform:uppercase}
.agenda-body{flex:1;min-width:0}
.agenda-title{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--text)}
.agenda-desc{font-size:12px;color:var(--dim);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agenda-tag{padding:3px 10px;border-radius:999px;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:var(--accent);background:rgba(200,245,66,.1);border:1px solid rgba(200,245,66,.25)}
.agenda-tag.t-sessao{color:var(--blue);background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3)}
.agenda-tag.t-combate{color:var(--red);background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}
.agenda-tag.t-festa{color:var(--gold);background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3)}
.agenda-tag.t-mistica{color:var(--purple);background:rgba(192,132,252,.12);border-color:rgba(192,132,252,.3)}
.agenda-tag.t-luna{color:var(--accent-2);background:rgba(154,160,179,.1);border-color:rgba(154,160,179,.3)}
.agenda-tag.t-marco{color:var(--rose);background:rgba(244,114,182,.1);border-color:rgba(244,114,182,.3)}

.empty{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;letter-spacing:1.5px;text-transform:uppercase}

/* MODAL */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:300;opacity:0;transition:opacity .2s}
.modal-back.open{display:flex;opacity:1}
.modal{width:min(520px,94vw);max-height:90vh;overflow:hidden;background:linear-gradient(180deg,#10101a,#0a0a10);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.modal-h h3{font-family:'Cinzel',serif;font-size:14px;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.modal-x{background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;line-height:1;padding:0 6px}
.modal-x:hover{color:var(--accent)}
.modal-b{padding:22px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-f{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600}
.field input,.field select,.field textarea{width:100%;background:var(--input);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:inherit;font-size:14px;outline:none}
.field textarea{resize:vertical;min-height:80px;font-family:inherit;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.type-opt{padding:9px 8px;border-radius:8px;background:var(--input);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;text-align:center;transition:all .15s}
.type-opt:hover{border-color:var(--border-hover)}
.type-opt.active{background:var(--card);border-color:currentColor;box-shadow:inset 0 0 0 1px currentColor}
.type-opt.t-sessao.active{color:var(--blue)}
.type-opt.t-combate.active{color:var(--red)}
.type-opt.t-festa.active{color:var(--gold)}
.type-opt.t-mistica.active{color:var(--purple)}
.type-opt.t-luna.active{color:var(--accent-2)}
.type-opt.t-marco.active{color:var(--rose)}

/* DETAIL POPOVER */
.detail-pop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:280;opacity:0;transition:opacity .18s}
.detail-pop.open{display:flex;opacity:1}
.detail-card{width:min(420px,92vw);max-height:80vh;overflow-y:auto;background:linear-gradient(180deg,#10101a,#0a0a10);border:1px solid var(--border);border-radius:14px;padding:22px}
.detail-day{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;margin-bottom:16px;letter-spacing:.4px}
.detail-events{display:flex;flex-direction:column;gap:10px}
.detail-evt{padding:12px 14px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.detail-evt-body{flex:1;min-width:0}
.detail-evt-ttl{font-size:13.5px;font-weight:600;margin-bottom:3px}
.detail-evt-d{font-size:11.5px;color:var(--dim);line-height:1.55}
.detail-evt-acts{display:flex;gap:4px;flex-shrink:0}
.detail-evt-acts button{background:var(--input);border:1px solid var(--border);color:var(--dim);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-evt-acts button:hover{color:var(--accent);border-color:var(--accent)}
.detail-evt-acts button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.detail-evt-acts button.danger:hover{color:var(--red);border-color:var(--red)}
.add-here{margin-top:14px;width:100%}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:999px;font-size:12.5px;letter-spacing:.5px;opacity:0;pointer-events:none;transition:all .25s;z-index:400;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:720px){
  body{padding:48px 14px 90px}
  .cal-head{flex-direction:column;align-items:stretch}
  .cal-title h1{font-size:22px}
  .month-label{min-width:140px;font-size:15px}
  .cal-day{padding:5px;border-radius:8px}
  .cal-day-num{font-size:11px}
  .cal-day-pill{font-size:8px}
  .cal-grid{gap:3px}
  .agenda-item{padding:10px 12px}
  .agenda-date{min-width:auto;font-size:10px}
}
</style>
</head>
<body>

<a class="btn ghost btn-back" href="index.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Ficha</a>

<header class="cal-head">
  <div class="cal-title">
    <div class="cal-logo" aria-hidden="true"></div>
    <div>
      <h1>Calendário Eclipse</h1>
      <small>Linha do tempo da campanha</small>
    </div>
  </div>
  <div class="cal-actions">
    <button class="btn" onclick="goToday()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Hoje</button>
    <button class="btn" onclick="exportData()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar</button>
    <button class="btn" onclick="document.getElementById('imp').click()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importar</button>
    <button class="btn primary" onclick="openModal()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo Evento</button>
    <input id="imp" type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])">
  </div>
</header>

<div class="bar">
  <div class="bar-left">
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()" title="Anterior"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="month-label" id="month-label">—</div>
      <button class="nav-btn" onclick="nextMonth()" title="Próximo"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <select id="filter-type" onchange="render()">
      <option value="">Todos os tipos</option>
      <option value="sessao">Sessão</option>
      <option value="combate">Combate</option>
      <option value="festa">Festa / Reunião</option>
      <option value="mistica">Místico / Ritual</option>
      <option value="luna">Lua / Astronômico</option>
      <option value="marco">Marco narrativo</option>
      <option value="outro">Outro</option>
    </select>
  </div>
  <div class="bar-right">
    <div class="view-tabs">
      <button class="view-tab active" data-view="month" onclick="setView('month')">Mês</button>
      <button class="view-tab" data-view="agenda" onclick="setView('agenda')">Agenda</button>
    </div>
  </div>
</div>

<div class="cal-grid" id="grid">
  <div class="cal-dow">Dom</div>
  <div class="cal-dow">Seg</div>
  <div class="cal-dow">Ter</div>
  <div class="cal-dow">Qua</div>
  <div class="cal-dow">Qui</div>
  <div class="cal-dow">Sex</div>
  <div class="cal-dow">Sáb</div>
</div>

<div class="agenda" id="agenda"></div>

<!-- MODAL -->
<div class="modal-back" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h">
      <h3 id="modal-title">Novo evento</h3>
      <button class="modal-x" onclick="closeModal()" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal-b">
      <div class="field">
        <label>Título</label>
        <input id="f-title" type="text" placeholder="Ex.: Sessão 04 — Confronto na Catedral">
      </div>
      <div class="row">
        <div class="field">
          <label>Data</label>
          <input id="f-date" type="text" placeholder="AAAA-MM-DD">
        </div>
        <div class="field">
          <label>Hora (opcional)</label>
          <input id="f-time" type="text" placeholder="20:00">
        </div>
      </div>
      <div class="field">
        <label>Tipo</label>
        <div class="type-grid" id="type-grid">
          <button type="button" class="type-opt t-sessao" data-t="sessao">Sessão</button>
          <button type="button" class="type-opt t-combate" data-t="combate">Combate</button>
          <button type="button" class="type-opt t-festa" data-t="festa">Festa</button>
          <button type="button" class="type-opt t-mistica" data-t="mistica">Místico</button>
          <button type="button" class="type-opt t-luna" data-t="luna">Lua</button>
          <button type="button" class="type-opt t-marco" data-t="marco">Marco</button>
        </div>
      </div>
      <div class="field">
        <label>Descrição (opcional)</label>
        <textarea id="f-desc" placeholder="Notas, NPCs envolvidos, objetivos..."></textarea>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="saveEvent()">Salvar</button>
    </div>
  </div>
</div>

<!-- DAY DETAIL -->
<div class="detail-pop" id="detail" onclick="if(event.target===this)closeDetail()">
  <div class="detail-card" onclick="event.stopPropagation()">
    <div class="detail-day" id="detail-day">—</div>
    <div class="detail-events" id="detail-events"></div>
    <button class="btn primary add-here" id="detail-add">+ Adicionar evento neste dia</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='eclipse_calendar_v1';
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let state={cur:new Date(),view:'month',events:load(),editId:null,selDay:null,curType:'sessao'};

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(state.events))}
function uid(){return Math.random().toString(36).slice(2,10)}
function pad(n){return String(n).padStart(2,'0')}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function fmtDate(s){const[y,m,d]=s.split('-');return d+'/'+m+'/'+y}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2200)}

function setView(v){
  state.view=v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('grid').classList.toggle('hidden',v!=='month');
  document.getElementById('agenda').classList.toggle('active',v==='agenda');
  render();
}

function prevMonth(){state.cur.setMonth(state.cur.getMonth()-1);render()}
function nextMonth(){state.cur.setMonth(state.cur.getMonth()+1);render()}
function goToday(){state.cur=new Date();render()}

function eventsByDate(){
  const m=new Map();
  state.events.forEach(e=>{if(!m.has(e.date))m.set(e.date,[]);m.get(e.date).push(e)});
  for(const arr of m.values())arr.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  return m;
}

function render(){
  const cur=state.cur;const y=cur.getFullYear();const mo=cur.getMonth();
  document.getElementById('month-label').textContent=MONTHS[mo]+' '+y;
  const grid=document.getElementById('grid');
  // Remove all but the 7 dow headers
  grid.querySelectorAll('.cal-day').forEach(n=>n.remove());

  if(state.view==='month'){
    const first=new Date(y,mo,1);const dow=first.getDay();
    const lastDay=new Date(y,mo+1,0).getDate();
    const prevLast=new Date(y,mo,0).getDate();
    const today=ymd(new Date());
    const map=eventsByDate();
    const filter=document.getElementById('filter-type').value;
    const cells=[];
    for(let i=0;i<dow;i++)cells.push({d:prevLast-dow+i+1,muted:true,date:ymd(new Date(y,mo-1,prevLast-dow+i+1))});
    for(let d=1;d<=lastDay;d++)cells.push({d,muted:false,date:ymd(new Date(y,mo,d))});
    while(cells.length%7)cells.push({d:cells.length-(dow+lastDay)+1,muted:true,date:ymd(new Date(y,mo+1,cells.length-(dow+lastDay)+1))});
    cells.forEach(c=>{
      const el=document.createElement('div');
      el.className='cal-day'+(c.muted?' muted':'')+(c.date===today?' today':'');
      el.innerHTML='<div class="cal-day-num">'+c.d+'</div>';
      let evts=(map.get(c.date)||[]);
      if(filter)evts=evts.filter(e=>e.type===filter);
      if(evts.length){
        el.classList.add('has-event');
        const mini=document.createElement('div');mini.className='cal-day-mini';
        evts.slice(0,2).forEach(e=>{
          const p=document.createElement('div');p.className='cal-day-pill t-'+e.type;p.textContent=e.title;mini.appendChild(p);
        });
        if(evts.length>2){const m=document.createElement('div');m.className='cal-day-more';m.textContent='+'+(evts.length-2);mini.appendChild(m)}
        el.appendChild(mini);
      }
      el.onclick=()=>openDetail(c.date);
      grid.appendChild(el);
    });
  }else{
    // Agenda
    const agenda=document.getElementById('agenda');agenda.innerHTML='';
    const filter=document.getElementById('filter-type').value;
    let list=state.events.slice().filter(e=>{
      const [yy,mm]=e.date.split('-').map(Number);
      return yy===y && (mm-1)===mo && (!filter||e.type===filter);
    });
    list.sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
    if(!list.length){agenda.innerHTML='<div class="empty">Nenhum evento neste mês</div>';return}
    list.forEach(e=>{
      const it=document.createElement('div');it.className='agenda-item';
      it.innerHTML=`
        <div class="agenda-date">${fmtDate(e.date)}${e.time?' · '+e.time:''}</div>
        <div class="agenda-body">
          <div class="agenda-title">${escapeHtml(e.title)}</div>
          <div class="agenda-desc">${escapeHtml(e.desc||'—')}</div>
        </div>
        <div class="agenda-tag t-${e.type}">${labelType(e.type)}</div>
      `;
      it.onclick=()=>openModal(e);
      agenda.appendChild(it);
    });
  }
}

function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function labelType(t){return{sessao:'Sessão',combate:'Combate',festa:'Festa',mistica:'Místico',luna:'Lua',marco:'Marco',outro:'Outro'}[t]||'Outro'}

function openModal(ev){
  state.editId=ev?ev.id:null;
  document.getElementById('modal-title').textContent=ev?'Editar evento':'Novo evento';
  document.getElementById('f-title').value=ev?ev.title:'';
  document.getElementById('f-date').value=ev?ev.date:(state.selDay||ymd(new Date()));
  document.getElementById('f-time').value=ev?(ev.time||''):'';
  document.getElementById('f-desc').value=ev?(ev.desc||''):'';
  state.curType=ev?ev.type:'sessao';
  syncTypes();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.remove('open');state.editId=null;state.selDay=null}
function syncTypes(){document.querySelectorAll('.type-opt').forEach(b=>b.classList.toggle('active',b.dataset.t===state.curType))}
document.querySelectorAll('.type-opt').forEach(b=>b.onclick=()=>{state.curType=b.dataset.t;syncTypes()});
function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value.trim();
  if(!title){toast('Título obrigatório');return}
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){toast('Data inválida (use AAAA-MM-DD)');return}
  const time=document.getElementById('f-time').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  if(state.editId){
    const e=state.events.find(x=>x.id===state.editId);
    if(e)Object.assign(e,{title,date,time,desc,type:state.curType});
  }else{
    state.events.push({id:uid(),title,date,time,desc,type:state.curType});
  }
  save();render();closeModal();toast('Evento salvo');
}
function delEvent(id){
  if(!confirm('Excluir este evento?'))return;
  state.events=state.events.filter(e=>e.id!==id);save();render();
  document.getElementById('detail').classList.remove('open');
  toast('Removido');
}

function openDetail(date){
  state.selDay=date;
  const evts=state.events.filter(e=>e.date===date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const [y,m,d]=date.split('-');
  document.getElementById('detail-day').textContent=`${parseInt(d,10)} de ${MONTHS[parseInt(m,10)-1]} de ${y}`;
  const list=document.getElementById('detail-events');
  if(!evts.length){list.innerHTML='<div class="empty" style="padding:20px 8px">Nenhum evento</div>'}
  else{
    list.innerHTML=evts.map(e=>`
      <div class="detail-evt" style="border-left-color:var(--${
        e.type==='sessao'?'blue':e.type==='combate'?'red':e.type==='festa'?'gold':e.type==='mistica'?'purple':e.type==='luna'?'accent-2':e.type==='marco'?'rose':'accent'
      })">
        <div class="detail-evt-body">
          <div class="detail-evt-ttl">${escapeHtml(e.title)}${e.time?' <span style="color:var(--dim);font-weight:400;font-family:JetBrains Mono,monospace;font-size:11px">'+e.time+'</span>':''}</div>
          <div class="detail-evt-d">${escapeHtml(e.desc||labelType(e.type))}</div>
        </div>
        <div class="detail-evt-acts">
          <button onclick='openModal(${JSON.stringify(e).replace(/"/g,"&quot;")})' title="Editar"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="danger" onclick="delEvent('${e.id}')" title="Excluir"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('detail-add').onclick=()=>{closeDetail();openModal()};
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open')}

function exportData(){
  const blob=new Blob([JSON.stringify({version:1,events:state.events},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='eclipse-calendario-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);toast('Exportado');
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(!d||!Array.isArray(d.events))throw 0;
    if(confirm('Substituir eventos existentes? Cancelar = mesclar.')){state.events=d.events}
    else{const ids=new Set(state.events.map(e=>e.id));d.events.forEach(e=>{if(!ids.has(e.id))state.events.push(e)})}
    save();render();toast('Importado');
  }catch{toast('Arquivo inválido')}};
  r.readAsText(file);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeDetail()}
  if(e.key==='ArrowLeft'&&!e.target.matches('input,textarea,select'))prevMonth();
  if(e.key==='ArrowRight'&&!e.target.matches('input,textarea,select'))nextMonth();
});

render();

// Service worker registration
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
